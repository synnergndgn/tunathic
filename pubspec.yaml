name: tunathic
description: "Tunathic – Guitar Toolkit by GUNDEV."
publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ^3.12.0

dependencies:
  audioplayers: ^6.8.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: 0.20.2
  package_info_plus: ^10.2.0
  record: 7.1.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audio/
